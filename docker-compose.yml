services:
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  dashboard:
    image: docker.io/<your-namespace>/ghostmon-dashboard:latest
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      RedisConnectionString: redis:6379,abortConnect=false
      SecurityToken: replace-with-a-shared-secret
      AgentImage: docker.io/<your-namespace>/ghostmon-agent:latest
      TelemetryIntervalSeconds: 5
      PingTimeoutMilliseconds: 500
      PingTargetMode: Both
      PingTargets: ""
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8080/healthz
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  agent:
    image: docker.io/<your-namespace>/ghostmon-agent:latest
    depends_on:
      dashboard:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DashboardBaseUrl: http://dashboard:8080
      SecurityToken: replace-with-a-shared-secret
      NodeName: node-01
      GroupName: default
      AgentPort: 8081
      TelemetryIntervalSeconds: 5
      PingTimeoutMilliseconds: 500
      PingTargetMode: Both
      PingTargets: ""
      HostProcPath: /host-proc
      HostSysPath: /host-sys
      HostRootPath: /host-root
      HostTmpPath: /host-tmp
    volumes:
      - /proc:/host-proc:ro
      - /sys:/host-sys:ro
      - /:/host-root:ro
      - /tmp:/host-tmp
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8081/healthz
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  redis-data:
