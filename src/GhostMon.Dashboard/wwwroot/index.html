<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>GhostMon 控制台</title>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0d1b2f;
      --panel: rgba(11, 20, 36, 0.82);
      --panel-border: rgba(129, 170, 255, 0.16);
      --text: #e9f1ff;
      --muted: #94a6c5;
      --accent: #63d2ff;
      --accent-2: #8ef0b5;
      --warn: #ffcb6b;
      --bad: #ff7b7b;
      --good: #80ed99;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      --radius: 20px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(99, 210, 255, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(142, 240, 181, 0.12), transparent 28%),
        linear-gradient(160deg, var(--bg), var(--bg2));
    }

    .shell {
      max-width: 1520px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 3.2vw, 4.4rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      max-width: 72ch;
      line-height: 1.6;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .badge {
      padding: 10px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 13px;
      backdrop-filter: blur(12px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .card-head {
      padding: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .card-title {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-body {
      padding: 18px;
    }

    .kpi {
      display: grid;
      gap: 8px;
    }

    .kpi .value {
      font-size: clamp(1.4rem, 2.2vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .search-box {
      flex: 1 1 340px;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.16);
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .chip.active {
      border-color: rgba(99, 210, 255, 0.5);
      background: rgba(99, 210, 255, 0.14);
    }

    .mono {
      font-family: var(--mono);
      font-size: 13px;
      color: #d8e5ff;
      word-break: break-word;
    }

    .muted { color: var(--muted); }
    .good { color: var(--good); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }

    .nodes {
      display: grid;
      gap: 16px;
    }

    .group {
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.025);
      border-radius: 18px;
      overflow: hidden;
    }

    .group > summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      user-select: none;
    }

    .group > summary::-webkit-details-marker { display: none; }

    .group-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .group-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.16);
      font-size: 12px;
      white-space: nowrap;
    }

    .group-body {
      display: grid;
      gap: 14px;
      padding: 0 18px 18px;
    }

    .node {
      display: grid;
      gap: 14px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
    }

    .node-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .node-name {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .node-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .stat-list {
      display: grid;
      gap: 12px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 180px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .stat-row .name {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .bar > span {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .sparkline-card {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr auto;
      align-items: end;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(0, 0, 0, 0.14);
    }

    .sparkline-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .sparkline {
      width: 100%;
      height: 72px;
      display: block;
      color: var(--accent);
    }

    .sparkline path {
      fill: currentColor;
      opacity: 0.12;
    }

    .sparkline polyline {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .history-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .history-item .h-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .history-item .h-value {
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 13px;
    }

    .span-12 { grid-column: span 12; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }

    @media (max-width: 1100px) {
      .span-6, .span-4 { grid-column: span 12; }
      .hero { grid-template-columns: 1fr; }
      .badge-row { justify-content: flex-start; }
      .stat-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .shell { padding: 16px; }
      .title { font-size: 2.2rem; }
      .control-row { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <h1 class="title">GhostMon 控制台</h1>
        <p class="subtitle">轻量服务器探针控制台。GhostMon 把采集和存储放在后端，这个页面只负责渲染实时状态、资产信息和 24 小时历史，并提供搜索与筛选。</p>
      </div>
      <div class="badge-row">
        <div class="badge">SignalR: <span id="connState">连接中</span></div>
        <div class="badge">节点数: <span id="nodeCount">0</span></div>
        <div class="badge">可见: <span id="visibleCount">0</span></div>
        <div class="badge">最近更新: <span id="lastUpdate">-</span></div>
      </div>
    </section>

    <section class="grid">
      <article class="card span-4">
        <div class="card-head">
          <h2 class="card-title">集群状态</h2>
        </div>
        <div class="card-body kpi">
          <div class="value" id="clusterValue">空闲</div>
          <div class="label">广播流</div>
          <div class="mono muted" id="clusterDetail">等待第一份快照。</div>
        </div>
      </article>

      <article class="card span-4">
        <div class="card-head">
          <h2 class="card-title">流量</h2>
        </div>
        <div class="card-body kpi">
          <div class="value" id="trafficValue">0 kbps</div>
          <div class="label">可见节点网络总吞吐</div>
          <div class="mono muted" id="trafficDetail">可见节点的 Rx / Tx 总吞吐。</div>
        </div>
      </article>

      <article class="card span-4">
        <div class="card-head">
          <h2 class="card-title">健康</h2>
        </div>
        <div class="card-body kpi">
          <div class="value" id="healthValue">未知</div>
          <div class="label">当前集群状态</div>
          <div class="mono muted" id="healthDetail">根据最新广播计算。</div>
        </div>
      </article>

      <article class="card span-12">
        <div class="card-head">
          <h2 class="card-title">筛选</h2>
          <div class="mono muted" id="filterSummary">未启用筛选。</div>
        </div>
        <div class="card-body controls">
          <div class="control-row">
            <label class="search-box">
              <span class="mono muted">搜索</span>
              <input id="searchInput" type="search" placeholder="按节点名 / IP / 分组 / CPU 型号 搜索" />
            </label>
            <div class="filter-group" id="healthFilters">
              <button class="chip active" data-health="all" type="button">全部</button>
              <button class="chip" data-health="healthy" type="button">健康</button>
              <button class="chip" data-health="warning" type="button">警告</button>
              <button class="chip" data-health="degraded" type="button">退化</button>
            </div>
          </div>
          <div class="control-row">
            <div class="filter-group">
              <button class="chip" id="toggleGroupsBtn" type="button">全部折叠</button>
              <button class="chip" id="refreshBtn" type="button">刷新快照</button>
            </div>
            <div class="mono muted" id="stateHint">页面通过 SignalR 保持实时更新，刷新仅用于手动获取最新快照。</div>
          </div>
        </div>
      </article>

      <article class="card span-12">
        <div class="card-head">
          <h2 class="card-title">节点</h2>
          <div class="mono muted">按分组展示 24 小时历史曲线</div>
        </div>
        <div class="card-body">
          <div class="nodes" id="nodes"></div>
        </div>
      </article>
    </section>
  </div>

  <script>
    const state = {
      snapshot: null,
      lastSnapshotJson: "",
      lastRenderKey: "",
      search: "",
      healthFilter: "all",
      forceCollapseAll: false,
      groupOpen: new Map()
    };

    const el = (id) => document.getElementById(id);

    function fmtPercent(value) {
      return `${Number(value || 0).toFixed(1)}%`;
    }

    function fmtNumber(value, digits = 1) {
      return Number(value || 0).toFixed(digits);
    }

    function fmtBytes(value) {
      const v = Number(value || 0);
      if (v >= 1e12) return `${(v / 1e12).toFixed(2)} TB`;
      if (v >= 1e9) return `${(v / 1e9).toFixed(2)} GB`;
      if (v >= 1e6) return `${(v / 1e6).toFixed(2)} MB`;
      if (v >= 1e3) return `${(v / 1e3).toFixed(2)} KB`;
      return `${v.toFixed(0)} B`;
    }

    function formatTime(value) {
      if (!value) {
        return "-";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat("zh-CN", {
        dateStyle: "short",
        timeStyle: "medium"
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function barColor(percent) {
      if (percent >= 85) return "var(--bad)";
      if (percent >= 65) return "var(--warn)";
      return "linear-gradient(90deg, var(--accent), var(--accent-2))";
    }

    function assessNode(node) {
      const metrics = node.currentMetrics || {};
      const runtime = metrics.runtime || {};
      const sanity = metrics.sanity || {};

      if (sanity.diskReadOnlyPanic) {
        return "degraded";
      }

      if ((runtime.cpuUsedPercent || 0) >= 90 ||
          (runtime.memoryUsedPercent || 0) >= 90 ||
          (runtime.diskUsedPercent || 0) >= 95) {
        return "degraded";
      }

      if ((runtime.cpuUsedPercent || 0) >= 70 ||
          (runtime.memoryUsedPercent || 0) >= 75 ||
          (runtime.diskUsedPercent || 0) >= 85) {
        return "warning";
      }

      return "healthy";
    }

    function healthLabel(value) {
      switch (value) {
        case "healthy": return "健康";
        case "warning": return "警告";
        case "degraded": return "退化";
        default: return "未知";
      }
    }

    function healthClass(value) {
      switch (value) {
        case "healthy": return "good";
        case "warning": return "warn";
        case "degraded": return "bad";
        default: return "muted";
      }
    }

    function matchesSearch(node, query) {
      if (!query) {
        return true;
      }

      const reg = node.registration || {};
      const metrics = node.currentMetrics || {};
      const assets = metrics.assets || reg.assets || {};
      const haystack = [
        reg.nodeName,
        reg.groupName,
        reg.remoteIp,
        assets.cpuModelName,
        assets.osPlatform
      ]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();

      return haystack.includes(query);
    }

    function sampleHistoryValues(history, selector, maxPoints = 64) {
      if (!Array.isArray(history) || history.length === 0) {
        return [];
      }

      const limit = Math.min(maxPoints, history.length);
      if (limit <= 1) {
        return [Number(selector(history[history.length - 1]) || 0)];
      }

      const values = [];
      const lastIndex = history.length - 1;
      const step = lastIndex / (limit - 1);

      for (let i = 0; i < limit; i++) {
        const index = Math.max(0, Math.min(lastIndex, Math.round(lastIndex - (i * step))));
        values.push(Number(selector(history[index]) || 0));
      }

      return values;
    }

    function buildSparklineSvg(values) {
      const width = 160;
      const height = 56;
      const padding = 4;

      if (!values.length) {
        return `
          <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
            <polyline points=""></polyline>
          </svg>
        `;
      }

      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(1, max - min);
      const step = values.length === 1 ? 0 : (width - padding * 2) / (values.length - 1);

      const points = values.map((value, index) => {
        const x = padding + step * index;
        const y = height - padding - ((value - min) / range) * (height - padding * 2);
        return `${x.toFixed(2)},${y.toFixed(2)}`;
      });

      const first = points[0].split(",");
      const last = points[points.length - 1].split(",");
      const areaPath = `M ${first[0]} ${height - padding} L ${points.map((point) => point.replace(",", " ")).join(" L ")} L ${last[0]} ${height - padding} Z`;

      return `
        <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
          <path d="${areaPath}"></path>
          <polyline points="${points.join(" ")}"></polyline>
        </svg>
      `;
    }

    function historyBlock(label, value) {
      return `
        <div class="history-item">
          <div class="h-label">${escapeHtml(label)}</div>
          <div class="h-value">${escapeHtml(String(value))}</div>
        </div>
      `;
    }

    function statRow(name, value, percent) {
      return `
        <div class="stat-row">
          <div class="name">${escapeHtml(name)}</div>
          <div class="bar"><span style="width:${Math.max(0, Math.min(100, percent || 0))}%; background:${barColor(percent || 0)}"></span></div>
          <div class="mono">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderNode(node) {
      const reg = node.registration || {};
      const metrics = node.currentMetrics || {};
      const assets = metrics.assets || reg.assets || {};
      const runtime = metrics.runtime || {};
      const sanity = metrics.sanity || {};
      const history = Array.isArray(node.history) ? node.history : [];
      const health = assessNode(node);
      const cpu = Number(runtime.cpuUsedPercent || 0);
      const mem = Number(runtime.memoryUsedPercent || 0);
      const swap = Number(runtime.swapUsedPercent || 0);
      const disk = Number(runtime.diskUsedPercent || 0);
      const cpuHistory = sampleHistoryValues(history, (entry) => entry?.metrics?.runtime?.cpuUsedPercent ?? 0);
      const netHistory = sampleHistoryValues(history, (entry) => (entry?.metrics?.runtime?.netRxSpeedKbps ?? 0) + (entry?.metrics?.runtime?.netTxSpeedKbps ?? 0));

      const topItems = [
        `IP ${reg.remoteIp || "暂无"}`,
        `分组 ${reg.groupName || "默认"}`,
        `端口 ${reg.metricsPort || 0}`,
        `更新 ${formatTime(reg.lastSeenUtc)}`
      ];

      return `
        <article class="node">
          <div class="node-top">
            <div>
              <h3 class="node-name">${escapeHtml(reg.nodeName || "未命名节点")}</h3>
              <div class="node-meta">
                ${topItems.map((item) => `<span class="pill">${escapeHtml(item)}</span>`).join("")}
              </div>
            </div>
            <div class="pill ${healthClass(health)}">${healthLabel(health).toUpperCase()}</div>
          </div>

          <div class="stat-list">
            ${statRow("CPU", fmtPercent(cpu), cpu)}
            ${statRow("内存", fmtPercent(mem), mem)}
            ${statRow("交换分区", fmtPercent(swap), swap)}
            ${statRow("磁盘", fmtPercent(disk), disk)}
          </div>

          <div class="sparkline-card">
            <div>
              <div class="sparkline-title">CPU 24 小时历史</div>
              ${buildSparklineSvg(cpuHistory)}
            </div>
            <div class="mono muted">${cpuHistory.length} 个点</div>
          </div>

          <div class="sparkline-card">
            <div>
              <div class="sparkline-title">网络 24 小时历史</div>
              ${buildSparklineSvg(netHistory)}
            </div>
            <div class="mono muted">收 + 发</div>
          </div>

          <div class="history-grid">
            ${historyBlock("型号", assets.cpuModelName || "暂无")}
            ${historyBlock("系统", assets.osPlatform || "暂无")}
            ${historyBlock("磁盘只读", sanity.diskReadOnlyPanic ? "是" : "否")}
            ${historyBlock("接收", fmtBytes(runtime.bootTotalRxBytes || 0))}
            ${historyBlock("发送", fmtBytes(runtime.bootTotalTxBytes || 0))}
            ${historyBlock("IPv4 延迟", runtime.pingV4DelayMs ?? "暂无")}
            ${historyBlock("IPv6 延迟", runtime.pingV6DelayMs ?? "暂无")}
            ${historyBlock("磁盘读速", fmtBytes(runtime.diskReadBytesPerSec || 0))}
            ${historyBlock("磁盘写速", fmtBytes(runtime.diskWriteBytesPerSec || 0))}
          </div>
        </article>
      `;
    }

    function summarizeHealth(nodes) {
      if (!nodes.length) {
        return { label: "空闲", detail: "当前还没有节点注册。", tone: "muted" };
      }

      let badCount = 0;
      let warnCount = 0;

      for (const node of nodes) {
        const health = assessNode(node);
        if (health === "degraded") {
          badCount += 1;
        } else if (health === "warning") {
          warnCount += 1;
        }
      }

      if (badCount > 0) {
        return { label: "退化", detail: `${badCount} 台节点处于退化状态，${warnCount} 台处于警告状态。`, tone: "bad" };
      }

      if (warnCount > 0) {
        return { label: "警告", detail: `${warnCount} 台节点需要关注。`, tone: "warn" };
      }

      return { label: "健康", detail: "最新快照中没有活动告警。", tone: "good" };
    }

    function groupNodes(nodes) {
      const groups = new Map();

      for (const node of nodes) {
        const reg = node.registration || {};
        const groupName = (reg.groupName || "默认").trim() || "默认";
        if (!groups.has(groupName)) {
          groups.set(groupName, []);
        }

        groups.get(groupName).push(node);
      }

      return [...groups.entries()]
        .map(([groupName, items]) => ({
          groupName,
          items: items.sort((a, b) => {
            const aName = (a.registration?.nodeName || "").toLowerCase();
            const bName = (b.registration?.nodeName || "").toLowerCase();
            return aName.localeCompare(bName);
          })
        }))
        .sort((a, b) => a.groupName.localeCompare(b.groupName));
    }

    function getVisibleNodes() {
      const snapshot = state.snapshot;
      if (!snapshot || !Array.isArray(snapshot.nodes)) {
        return [];
      }

      const query = state.search.trim().toLowerCase();
      return snapshot.nodes.filter((node) => {
        const nodeHealth = assessNode(node);
        const healthMatches = state.healthFilter === "all" || state.healthFilter === nodeHealth;
        return healthMatches && matchesSearch(node, query);
      });
    }

    function renderFilters(snapshot, visibleNodes) {
      const totalNodes = Array.isArray(snapshot?.nodes) ? snapshot.nodes.length : 0;
      const activeFilters = [];

      if (state.search.trim()) {
        activeFilters.push(`搜索="${state.search.trim()}"`);
      }

      if (state.healthFilter !== "all") {
        activeFilters.push(`健康=${state.healthFilter}`);
      }

      el("nodeCount").textContent = String(totalNodes);
      el("visibleCount").textContent = String(visibleNodes.length);
      el("filterSummary").textContent = activeFilters.length ? activeFilters.join(" · ") : "暂无筛选条件。";
    }

    function render(snapshot) {
      if (snapshot) {
        const json = JSON.stringify(snapshot);
        if (json !== state.lastSnapshotJson) {
          state.lastSnapshotJson = json;
          state.snapshot = snapshot;
        }
      }

      snapshot = state.snapshot;
      if (!snapshot) {
        el("nodes").innerHTML = '<div class="mono muted">当前还没有在线节点快照。</div>';
        return;
      }

      const visibleNodes = getVisibleNodes();
      const renderKey = JSON.stringify({
        stamp: snapshot.broadcastedAtUtc || "",
        search: state.search,
        health: state.healthFilter,
        collapse: state.forceCollapseAll
      });

      if (renderKey === state.lastRenderKey) {
        renderFilters(snapshot, visibleNodes);
        return;
      }

      state.lastRenderKey = renderKey;

      const summary = summarizeHealth(visibleNodes);
      const totalNodes = Array.isArray(snapshot.nodes) ? snapshot.nodes.length : 0;

      el("lastUpdate").textContent = formatTime(snapshot.broadcastedAtUtc);
      el("clusterValue").textContent = summary.label;
      el("clusterValue").className = `value ${summary.tone}`;
      el("clusterDetail").textContent = summary.detail;
      el("healthValue").textContent = summary.label;
      el("healthValue").className = `value ${summary.tone}`;
      el("healthDetail").textContent = summary.detail;

      let totalRx = 0;
      let totalTx = 0;
      for (const node of visibleNodes) {
        const runtime = node.currentMetrics?.runtime || {};
        totalRx += Number(runtime.netRxSpeedKbps || 0);
        totalTx += Number(runtime.netTxSpeedKbps || 0);
      }
      el("trafficValue").textContent = `${fmtNumber(totalRx + totalTx, 1)} kbps`;
      el("trafficDetail").textContent = `Rx ${fmtNumber(totalRx, 1)} kbps · Tx ${fmtNumber(totalTx, 1)} kbps`;

      const groups = groupNodes(visibleNodes);
      const markup = groups.length
        ? groups.map((group) => {
            const counts = group.items.reduce((acc, node) => {
              acc[assessNode(node)] += 1;
              return acc;
            }, { healthy: 0, warning: 0, degraded: 0 });

            const open = state.forceCollapseAll
              ? false
              : state.groupOpen.has(group.groupName)
                ? state.groupOpen.get(group.groupName)
                : true;

            return `
              <details class="group" data-group="${escapeHtml(group.groupName)}" ${open ? "open" : ""}>
                <summary>
                  <div>
                    <h3 class="group-title">${escapeHtml(group.groupName)}</h3>
                    <div class="mono muted">${group.items.length} 台 · ${counts.healthy} 健康 · ${counts.warning} 警告 · ${counts.degraded} 退化</div>
                  </div>
                  <div class="group-meta">
                    <span class="pill">可见 ${group.items.length}</span>
                    <span class="pill">总数 ${totalNodes}</span>
                  </div>
                </summary>
                <div class="group-body">
                  ${group.items.map(renderNode).join("")}
                </div>
              </details>
            `;
          }).join("")
        : '<div class="mono muted">没有节点符合当前筛选条件。</div>';

      el("nodes").innerHTML = markup;
      renderFilters(snapshot, visibleNodes);
      el("toggleGroupsBtn").textContent = state.forceCollapseAll ? "展开全部分组" : "全部折叠";
    }

    async function fetchSnapshot() {
      try {
        const response = await fetch("/api/snapshot", { cache: "no-store" });
        if (!response.ok) {
          return;
        }

        const snapshot = await response.json();
        render(snapshot);
      } catch (err) {
        console.error(err);
      }
    }

    function loadSignalRLibrary() {
      if (window.signalR?.HubConnectionBuilder) {
        return Promise.resolve(window.signalR);
      }

      return new Promise((resolve) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/@microsoft/signalr@9.0.0/dist/browser/signalr.min.js";
        script.async = true;
        script.referrerPolicy = "no-referrer";
        script.onload = () => resolve(window.signalR ?? null);
        script.onerror = () => resolve(null);
        document.head.appendChild(script);
      });
    }

    async function connectSignalR() {
      const signalRSource = await loadSignalRLibrary();
      if (!signalRSource?.HubConnectionBuilder) {
        el("connState").textContent = "HTTP";
        return;
      }

      const connection = new signalRSource.HubConnectionBuilder()
        .withUrl("/hubs/probe")
        .withAutomaticReconnect([0, 2000, 5000, 10000])
        .build();

      connection.on("SnapshotUpdated", (snapshot) => {
        el("connState").textContent = "已连接";
        render(snapshot);
      });

      connection.onreconnecting(() => {
        el("connState").textContent = "重连中";
      });

      connection.onreconnected(() => {
        el("connState").textContent = "已连接";
      });

      connection.onclose(() => {
        el("connState").textContent = "已断开";
      });

      try {
        await connection.start();
        el("connState").textContent = "已连接";
      } catch (err) {
        el("connState").textContent = "HTTP";
        console.error(err);
      }
    }

    el("searchInput").addEventListener("input", (event) => {
      state.search = event.target.value || "";
      render();
    });

    el("healthFilters").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-health]");
      if (!button) {
        return;
      }

      state.healthFilter = button.dataset.health || "all";
      for (const chip of el("healthFilters").querySelectorAll(".chip")) {
        chip.classList.toggle("active", chip === button);
      }
      render();
    });

    el("toggleGroupsBtn").addEventListener("click", () => {
      state.forceCollapseAll = !state.forceCollapseAll;
      state.groupOpen.clear();
      render();
    });

    el("refreshBtn").addEventListener("click", () => {
      fetchSnapshot();
    });

    document.addEventListener("toggle", (event) => {
      const details = event.target;
      if (!(details instanceof HTMLDetailsElement) || !details.dataset.group) {
        return;
      }

      state.groupOpen.set(details.dataset.group, details.open);
    }, true);

    fetchSnapshot();
    connectSignalR();
  </script>
</body>
</html>
