<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>GhostMon 控制台</title>
  <style>
    :root {
      --bg: #060b14;
      --bg2: #0a1221;
      --panel: rgba(14, 20, 34, 0.96);
      --panel-soft: rgba(255, 255, 255, 0.03);
      --panel-border: rgba(145, 170, 215, 0.12);
      --text: #edf2ff;
      --muted: #92a1bd;
      --accent: #60d5ff;
      --accent-2: #89e7a8;
      --warn: #ffd36a;
      --bad: #ff7b86;
      --good: #7fe89a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 14px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: "Segoe UI Variable", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(96, 213, 255, 0.10), transparent 25%),
        radial-gradient(circle at 90% 10%, rgba(137, 231, 168, 0.07), transparent 22%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      position: relative;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 100%);
      opacity: 0.14;
    }

    .shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 16px 20px 20px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      position: sticky;
      top: 12px;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(0, auto) minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px 16px;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: rgba(10, 15, 26, 0.88);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(96, 213, 255, 0.28);
      background: linear-gradient(160deg, rgba(96, 213, 255, 0.18), rgba(137, 231, 168, 0.10));
      color: var(--accent);
      font-weight: 700;
      letter-spacing: -0.04em;
      flex: 0 0 auto;
    }

    .brand-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .brand-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      border-color: rgba(96, 213, 255, 0.28);
      background: rgba(96, 213, 255, 0.08);
      color: var(--text);
    }

    .topbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .badge {
      padding: 9px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .card-title {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .command-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .command-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .command-shell {
      margin: 0;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    .copy-button {
      border: 1px solid rgba(99, 210, 255, 0.35);
      background: rgba(99, 210, 255, 0.12);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .copy-button:hover {
      transform: translateY(-1px);
      background: rgba(99, 210, 255, 0.18);
      border-color: rgba(99, 210, 255, 0.5);
    }

    .copy-button:active {
      transform: translateY(0);
    }

    .kpi {
      display: grid;
      gap: 6px;
      position: relative;
    }

    .kpi .value {
      font-size: clamp(1.25rem, 1.9vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .kpi .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .search-box {
      flex: 1 1 340px;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.20);
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 12px;
    }

    .chip.active {
      border-color: rgba(99, 210, 255, 0.5);
      background: rgba(99, 210, 255, 0.12);
    }

    .mono {
      font-family: var(--mono);
      font-size: 13px;
      color: #d8e5ff;
      word-break: break-word;
    }

    .muted { color: var(--muted); }
    .good { color: var(--good); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }

    .nodes {
      display: grid;
      gap: 12px;
    }

    .group {
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.016);
      border-radius: 12px;
      overflow: hidden;
    }

    .group > summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      user-select: none;
      background: rgba(255, 255, 255, 0.02);
    }

    .group > summary::-webkit-details-marker { display: none; }

    .group-title {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .group-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .pill {
      border-radius: 999px;
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.18);
      font-size: 10px;
      white-space: nowrap;
    }

    .group-body {
      display: grid;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .node {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.026);
      overflow: hidden;
    }

    .node-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      list-style: none;
    }

    .node-summary::-webkit-details-marker {
      display: none;
    }

    .node.healthy .node-summary {
      background: linear-gradient(90deg, rgba(127, 232, 154, 0.10), transparent 26%);
    }

    .node.warning .node-summary {
      background: linear-gradient(90deg, rgba(255, 211, 106, 0.10), transparent 26%);
    }

    .node.degraded .node-summary {
      background: linear-gradient(90deg, rgba(255, 123, 134, 0.10), transparent 26%);
    }

    .node-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .node-topline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .node-name {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      color: var(--muted);
      font-size: 10px;
    }

    .node-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
    }

    .mini-stat {
      padding: 6px 8px;
      border-radius: 9px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: grid;
      gap: 4px;
    }

    .mini-stat .label {
      color: var(--muted);
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .mini-stat .value {
      font-family: var(--mono);
      font-size: 11px;
    }

    .node-side {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    .node-indicator {
      display: grid;
      justify-items: end;
      gap: 4px;
      min-width: 72px;
    }

    .node-health-pill {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.18);
    }

    .node-expand {
      display: grid;
      gap: 10px;
      padding: 0 12px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .stat-row .name {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .bar {
      position: relative;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .bar > span {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .sparkline-card {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr auto;
      align-items: end;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(0, 0, 0, 0.16);
    }

    .sparkline-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .sparkline {
      width: 100%;
      height: 64px;
      display: block;
      color: var(--accent);
    }

    .sparkline path {
      fill: currentColor;
      opacity: 0.12;
    }

    .sparkline polyline {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }

    .history-item {
      padding: 9px 11px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .history-item .h-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .history-item .h-value {
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .span-12 { grid-column: span 12; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }

    @media (max-width: 1100px) {
      .span-6, .span-4 { grid-column: span 12; }
      .topbar { grid-template-columns: 1fr; justify-items: start; }
      .nav-links { justify-content: flex-start; }
      .topbar-actions { justify-content: flex-start; }
      .stat-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .shell { padding: 14px; }
      .topbar { top: 8px; padding: 12px; }
      .brand-mark { width: 34px; height: 34px; border-radius: 10px; }
      .brand-title { font-size: 16px; }
      .control-row { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">G</div>
        <div class="brand-copy">
          <h1 class="brand-title">GhostMon</h1>
          <p class="brand-subtitle">Monitoring Console</p>
        </div>
      </div>
      <nav class="nav-links" aria-label="页面导航">
        <a class="nav-link active" href="#overview">概览</a>
        <a class="nav-link" href="#install">安装</a>
        <a class="nav-link" href="#nodes">节点</a>
      </nav>
      <div class="topbar-actions">
        <div class="badge">HTTP 轮询: <span id="connState">轮询中</span></div>
        <div class="badge">节点数: <span id="nodeCount">0</span></div>
        <div class="badge">可见: <span id="visibleCount">0</span></div>
      </div>
    </header>

    <section class="grid" id="overview">
      <article class="card span-12" id="install">
        <div class="card-head">
          <h2 class="card-title">Agent 安装</h2>
          <div class="mono muted" id="agentInstallStatus">等待生成安装命令。</div>
        </div>
        <div class="card-body">
          <div class="command-toolbar">
            <div class="command-note">复制后直接在被监控服务器执行。命令会使用 Dashboard 当前配置和当前访问地址。</div>
            <button class="copy-button" id="copyAgentInstallBtn" type="button">复制命令</button>
          </div>
          <pre class="command-shell" id="agentInstallCommand">加载中...</pre>
        </div>
      </article>

      <article class="card span-4">
        <div class="card-head">
          <h2 class="card-title">集群状态</h2>
        </div>
        <div class="card-body kpi">
          <div class="value" id="clusterValue">空闲</div>
          <div class="label">集群概况</div>
          <div class="mono muted" id="clusterDetail">等待第一份快照。</div>
        </div>
      </article>

      <article class="card span-4">
        <div class="card-head">
          <h2 class="card-title">流量</h2>
        </div>
        <div class="card-body kpi">
          <div class="value" id="trafficValue">0 kbps</div>
          <div class="label">网络总吞吐</div>
          <div class="mono muted" id="trafficDetail">可见节点的 Rx / Tx 总吞吐。</div>
        </div>
      </article>

      <article class="card span-4">
        <div class="card-head">
          <h2 class="card-title">健康</h2>
        </div>
        <div class="card-body kpi">
          <div class="value" id="healthValue">未知</div>
          <div class="label">健康概况</div>
          <div class="mono muted" id="healthDetail">根据最新广播计算。</div>
        </div>
      </article>

      <article class="card span-12">
        <div class="card-head">
          <h2 class="card-title">筛选</h2>
          <div class="mono muted" id="filterSummary">未启用筛选。</div>
        </div>
        <div class="card-body controls">
          <div class="control-row">
            <label class="search-box">
              <span class="mono muted">搜索</span>
              <input id="searchInput" type="search" placeholder="按节点名 / 分组 / CPU 型号 搜索" />
            </label>
            <div class="filter-group" id="healthFilters">
              <button class="chip active" data-health="all" type="button">全部</button>
              <button class="chip" data-health="healthy" type="button">健康</button>
              <button class="chip" data-health="warning" type="button">警告</button>
              <button class="chip" data-health="degraded" type="button">退化</button>
            </div>
          </div>
          <div class="control-row">
            <div class="filter-group">
              <button class="chip" id="toggleGroupsBtn" type="button">全部折叠</button>
              <button class="chip" id="refreshBtn" type="button">刷新快照</button>
            </div>
            <div class="mono muted" id="stateHint">页面通过 HTTP 轮询保持实时更新，刷新仅用于手动获取最新快照。</div>
          </div>
        </div>
      </article>

      <article class="card span-12" id="nodesCard">
        <div class="card-head">
          <h2 class="card-title">节点</h2>
          <div class="mono muted">按分组展示 24 小时历史曲线</div>
        </div>
        <div class="card-body">
          <div class="nodes" id="nodes"></div>
        </div>
      </article>
    </section>
  </div>

  <script>
    const state = {
      snapshot: null,
      installConfig: null,
      installCommand: "",
      lastSnapshotJson: "",
      lastRenderKey: "",
      snapshotPollTimer: null,
      search: "",
      healthFilter: "all",
      forceCollapseAll: false,
      groupOpen: new Map()
    };

    const el = (id) => document.getElementById(id);

    function applySnapshot(snapshot) {
      if (!snapshot) {
        return;
      }

      const json = JSON.stringify(snapshot);
      if (json === state.lastSnapshotJson) {
        return;
      }

      state.lastSnapshotJson = json;
      state.snapshot = snapshot;
    }

    function fmtPercent(value) {
      return `${Number(value || 0).toFixed(1)}%`;
    }

    function fmtNumber(value, digits = 1) {
      return Number(value || 0).toFixed(digits);
    }

    function fmtBytes(value) {
      const v = Number(value || 0);
      if (v >= 1e12) return `${(v / 1e12).toFixed(2)} TB`;
      if (v >= 1e9) return `${(v / 1e9).toFixed(2)} GB`;
      if (v >= 1e6) return `${(v / 1e6).toFixed(2)} MB`;
      if (v >= 1e3) return `${(v / 1e3).toFixed(2)} KB`;
      return `${v.toFixed(0)} B`;
    }

    function shellQuote(value) {
      return `'${String(value ?? "").split("'").join("'\\''")}'`;
    }

    function buildAgentInstallCommand(config) {
      const currentConfig = config || {};
      const agentPort = Number(currentConfig.agentPort || 8081);
      const hostProcPath = currentConfig.hostProcPath || "/proc";
      const hostSysPath = currentConfig.hostSysPath || "/sys";
      const hostRootPath = currentConfig.hostRootPath || "/";
      const hostTmpPath = currentConfig.hostTmpPath || "/tmp";
      const pingTargets = Array.isArray(currentConfig.pingTargets) ? currentConfig.pingTargets.join(",") : "";
      const dashboardBaseUrl = window.location.origin;
      const agentImage = currentConfig.agentImage || "docker.io/<your-namespace>/ghostmon-agent:latest";

      return [
        "docker run -d \\",
        "  --name ghostmon-agent \\",
        "  --restart unless-stopped \\",
        "  --add-host=host.docker.internal:host-gateway \\",
        `  -p ${agentPort}:${agentPort} \\`,
        `  -e DashboardBaseUrl=${shellQuote(dashboardBaseUrl)} \\`,
        `  -e SecurityToken=${shellQuote(currentConfig.securityToken)} \\`,
        `  -e NodeName=${shellQuote(currentConfig.nodeName || "node-01")} \\`,
        `  -e GroupName=${shellQuote(currentConfig.groupName || "default")} \\`,
        `  -e AgentPort=${shellQuote(agentPort)} \\`,
        `  -e TelemetryIntervalSeconds=${shellQuote(currentConfig.telemetryIntervalSeconds || 5)} \\`,
        `  -e PingTimeoutMilliseconds=${shellQuote(currentConfig.pingTimeoutMilliseconds || 500)} \\`,
        `  -e PingTargetMode=${shellQuote(currentConfig.pingTargetMode || "Both")} \\`,
        `  -e PingTargets=${shellQuote(pingTargets)} \\`,
        `  -e HostProcPath=${shellQuote(hostProcPath)} \\`,
        `  -e HostSysPath=${shellQuote(hostSysPath)} \\`,
        `  -e HostRootPath=${shellQuote(hostRootPath)} \\`,
        `  -e HostTmpPath=${shellQuote(hostTmpPath)} \\`,
        `  -v /proc:${hostProcPath}:ro \\`,
        `  -v /sys:${hostSysPath}:ro \\`,
        `  -v /:${hostRootPath}:ro \\`,
        `  -v /tmp:${hostTmpPath} \\`,
        `  ${shellQuote(agentImage)}`
      ].join("\n");
    }

    function renderAgentInstallCommand(config) {
      state.installConfig = config || null;
      state.installCommand = buildAgentInstallCommand(config);
      const commandEl = el("agentInstallCommand");
      const statusEl = el("agentInstallStatus");
      if (commandEl) {
        commandEl.textContent = state.installCommand;
      }
      if (statusEl) {
        statusEl.textContent = config?.agentImage
          ? "已根据 Dashboard 配置生成。"
          : "使用默认值生成。";
      }
    }

    function formatTime(value) {
      if (!value) {
        return "-";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat("zh-CN", {
        dateStyle: "short",
        timeStyle: "medium"
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function barColor(percent) {
      if (percent >= 85) return "var(--bad)";
      if (percent >= 65) return "var(--warn)";
      return "linear-gradient(90deg, var(--accent), var(--accent-2))";
    }

    function assessNode(node) {
      const metrics = node.currentMetrics || {};
      const runtime = metrics.runtime || {};
      const sanity = metrics.sanity || {};

      if (sanity.diskReadOnlyPanic) {
        return "degraded";
      }

      if ((runtime.cpuUsedPercent || 0) >= 90 ||
          (runtime.memoryUsedPercent || 0) >= 90 ||
          (runtime.diskUsedPercent || 0) >= 95) {
        return "degraded";
      }

      if ((runtime.cpuUsedPercent || 0) >= 70 ||
          (runtime.memoryUsedPercent || 0) >= 75 ||
          (runtime.diskUsedPercent || 0) >= 85) {
        return "warning";
      }

      return "healthy";
    }

    function healthLabel(value) {
      switch (value) {
        case "healthy": return "健康";
        case "warning": return "警告";
        case "degraded": return "退化";
        default: return "未知";
      }
    }

    function healthClass(value) {
      switch (value) {
        case "healthy": return "good";
        case "warning": return "warn";
        case "degraded": return "bad";
        default: return "muted";
      }
    }

    function matchesSearch(node, query) {
      if (!query) {
        return true;
      }

      const reg = node.registration || {};
      const metrics = node.currentMetrics || {};
      const assets = metrics.assets || reg.assets || {};
      const haystack = [
        reg.nodeName,
        reg.groupName,
        assets.cpuModelName,
        assets.osPlatform
      ]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();

      return haystack.includes(query);
    }

    function sampleHistoryValues(history, selector, maxPoints = 64) {
      if (!Array.isArray(history) || history.length === 0) {
        return [];
      }

      const limit = Math.min(maxPoints, history.length);
      if (limit <= 1) {
        return [Number(selector(history[history.length - 1]) || 0)];
      }

      const values = [];
      const lastIndex = history.length - 1;
      const step = lastIndex / (limit - 1);

      for (let i = 0; i < limit; i++) {
        const index = Math.max(0, Math.min(lastIndex, Math.round(lastIndex - (i * step))));
        values.push(Number(selector(history[index]) || 0));
      }

      return values;
    }

    function buildSparklineSvg(values) {
      const width = 160;
      const height = 56;
      const padding = 4;

      if (!values.length) {
        return `
          <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
            <polyline points=""></polyline>
          </svg>
        `;
      }

      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(1, max - min);
      const step = values.length === 1 ? 0 : (width - padding * 2) / (values.length - 1);

      const points = values.map((value, index) => {
        const x = padding + step * index;
        const y = height - padding - ((value - min) / range) * (height - padding * 2);
        return `${x.toFixed(2)},${y.toFixed(2)}`;
      });

      const first = points[0].split(",");
      const last = points[points.length - 1].split(",");
      const areaPath = `M ${first[0]} ${height - padding} L ${points.map((point) => point.replace(",", " ")).join(" L ")} L ${last[0]} ${height - padding} Z`;

      return `
        <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
          <path d="${areaPath}"></path>
          <polyline points="${points.join(" ")}"></polyline>
        </svg>
      `;
    }

    function historyBlock(label, value) {
      return `
        <div class="history-item">
          <div class="h-label">${escapeHtml(label)}</div>
          <div class="h-value">${escapeHtml(String(value))}</div>
        </div>
      `;
    }

    function miniStat(label, value) {
      return `
        <div class="mini-stat">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(String(value))}</div>
        </div>
      `;
    }

    function statRow(name, value, percent) {
      return `
        <div class="stat-row">
          <div class="name">${escapeHtml(name)}</div>
          <div class="bar"><span style="width:${Math.max(0, Math.min(100, percent || 0))}%; background:${barColor(percent || 0)}"></span></div>
          <div class="mono">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderNode(node) {
      const reg = node.registration || {};
      const metrics = node.currentMetrics || {};
      const assets = metrics.assets || reg.assets || {};
      const runtime = metrics.runtime || {};
      const sanity = metrics.sanity || {};
      const history = Array.isArray(node.history) ? node.history : [];
      const health = assessNode(node);
      const cpu = Number(runtime.cpuUsedPercent || 0);
      const mem = Number(runtime.memoryUsedPercent || 0);
      const swap = Number(runtime.swapUsedPercent || 0);
      const disk = Number(runtime.diskUsedPercent || 0);
      const netHistory = sampleHistoryValues(history, (entry) => (entry?.runtime?.netRxSpeedKbps ?? 0) + (entry?.runtime?.netTxSpeedKbps ?? 0));

      const topItems = [
        `分组 ${reg.groupName || "默认"}`,
        `端口 ${reg.metricsPort || 0}`,
        `更新 ${formatTime(reg.lastSeenUtc)}`
      ];

      return `
        <details class="node ${health}" ${state.forceCollapseAll ? "" : "open"}>
          <summary class="node-summary">
            <div class="node-main">
              <div class="node-topline">
                <h3 class="node-name">${escapeHtml(reg.nodeName || "未命名节点")}</h3>
                <span class="pill ${healthClass(health)}">${healthLabel(health).toUpperCase()}</span>
              </div>
              <div class="node-meta">
                ${topItems.map((item) => `<span class="pill">${escapeHtml(item)}</span>`).join("")}
              </div>
            </div>
            <div class="node-side">
              <div class="node-stats">
                ${miniStat("CPU", fmtPercent(cpu))}
                ${miniStat("MEM", fmtPercent(mem))}
                ${miniStat("NET", `${fmtNumber(runtime.netRxSpeedKbps + runtime.netTxSpeedKbps, 1)} kbps`)}
              </div>
              <div class="node-indicator">
                <span class="node-health-pill ${healthClass(health)}">${healthLabel(health)}</span>
                <span class="mono muted">${fmtPercent(cpu)} CPU</span>
              </div>
            </div>
          </summary>

          <div class="node-expand">
            <div class="stat-list">
              ${statRow("CPU", fmtPercent(cpu), cpu)}
              ${statRow("内存", fmtPercent(mem), mem)}
              ${statRow("交换分区", fmtPercent(swap), swap)}
              ${statRow("磁盘", fmtPercent(disk), disk)}
            </div>

            <div class="sparkline-card">
              <div>
                <div class="sparkline-title">网络 24 小时历史</div>
                ${buildSparklineSvg(netHistory)}
              </div>
              <div class="mono muted">收 + 发</div>
            </div>

            <div class="history-grid">
              ${historyBlock("型号", assets.cpuModelName || "暂无")}
              ${historyBlock("系统", assets.osPlatform || "暂无")}
              ${historyBlock("磁盘只读", sanity.diskReadOnlyPanic ? "是" : "否")}
              ${historyBlock("接收", fmtBytes(runtime.bootTotalRxBytes || 0))}
              ${historyBlock("发送", fmtBytes(runtime.bootTotalTxBytes || 0))}
              ${historyBlock("IPv4 延迟", runtime.pingV4DelayMs ?? "暂无")}
              ${historyBlock("IPv6 延迟", runtime.pingV6DelayMs ?? "暂无")}
              ${historyBlock("磁盘读速", fmtBytes(runtime.diskReadBytesPerSec || 0))}
              ${historyBlock("磁盘写速", fmtBytes(runtime.diskWriteBytesPerSec || 0))}
            </div>
          </div>
        </details>
      `;
    }

    function summarizeHealth(nodes) {
      if (!nodes.length) {
        return { label: "空闲", detail: "当前还没有节点注册。", tone: "muted" };
      }

      let badCount = 0;
      let warnCount = 0;

      for (const node of nodes) {
        const health = assessNode(node);
        if (health === "degraded") {
          badCount += 1;
        } else if (health === "warning") {
          warnCount += 1;
        }
      }

      if (badCount > 0) {
        return { label: "退化", detail: `${badCount} 台节点处于退化状态，${warnCount} 台处于警告状态。`, tone: "bad" };
      }

      if (warnCount > 0) {
        return { label: "警告", detail: `${warnCount} 台节点需要关注。`, tone: "warn" };
      }

      return { label: "健康", detail: "最新快照中没有活动告警。", tone: "good" };
    }

    function groupNodes(nodes) {
      const groups = new Map();

      for (const node of nodes) {
        const reg = node.registration || {};
        const groupName = (reg.groupName || "默认").trim() || "默认";
        if (!groups.has(groupName)) {
          groups.set(groupName, []);
        }

        groups.get(groupName).push(node);
      }

      return [...groups.entries()]
        .map(([groupName, items]) => ({
          groupName,
          items: items.sort((a, b) => {
            const aName = (a.registration?.nodeName || "").toLowerCase();
            const bName = (b.registration?.nodeName || "").toLowerCase();
            return aName.localeCompare(bName);
          })
        }))
        .sort((a, b) => a.groupName.localeCompare(b.groupName));
    }

    function getVisibleNodes() {
      const snapshot = state.snapshot;
      if (!snapshot || !Array.isArray(snapshot.nodes)) {
        return [];
      }

      const query = state.search.trim().toLowerCase();
      return snapshot.nodes.filter((node) => {
        const nodeHealth = assessNode(node);
        const healthMatches = state.healthFilter === "all" || state.healthFilter === nodeHealth;
        return healthMatches && matchesSearch(node, query);
      });
    }

    function renderFilters(totalNodes, visibleCount) {
      const activeFilters = [];

      if (state.search.trim()) {
        activeFilters.push(`搜索="${state.search.trim()}"`);
      }

      if (state.healthFilter !== "all") {
        activeFilters.push(`健康=${state.healthFilter}`);
      }

      el("nodeCount").textContent = String(totalNodes);
      el("visibleCount").textContent = String(visibleCount);
      el("filterSummary").textContent = activeFilters.length ? activeFilters.join(" · ") : "暂无筛选条件。";
    }

    function render(snapshot) {
      applySnapshot(snapshot);

      snapshot = state.snapshot;
      if (!snapshot) {
        el("nodes").innerHTML = '<div class="mono muted">当前还没有在线节点快照。</div>';
        return;
      }

      const visibleNodes = getVisibleNodes();
      const renderKey = JSON.stringify({
        stamp: snapshot.broadcastedAtUtc || "",
        search: state.search,
        health: state.healthFilter,
        collapse: state.forceCollapseAll
      });

      if (renderKey === state.lastRenderKey) {
        return;
      }

      state.lastRenderKey = renderKey;

      const summary = summarizeHealth(visibleNodes);
      const totalNodes = Array.isArray(snapshot.nodes) ? snapshot.nodes.length : 0;

      el("lastUpdate").textContent = formatTime(snapshot.broadcastedAtUtc);
      el("clusterValue").textContent = summary.label;
      el("clusterValue").className = `value ${summary.tone}`;
      el("clusterDetail").textContent = summary.detail;
      el("healthValue").textContent = summary.label;
      el("healthValue").className = `value ${summary.tone}`;
      el("healthDetail").textContent = summary.detail;

      let totalRx = 0;
      let totalTx = 0;
      for (const node of visibleNodes) {
        const runtime = node.currentMetrics?.runtime || {};
        totalRx += Number(runtime.netRxSpeedKbps || 0);
        totalTx += Number(runtime.netTxSpeedKbps || 0);
      }
      el("trafficValue").textContent = `${fmtNumber(totalRx + totalTx, 1)} kbps`;
      el("trafficDetail").textContent = `Rx ${fmtNumber(totalRx, 1)} kbps · Tx ${fmtNumber(totalTx, 1)} kbps`;

      const groups = groupNodes(visibleNodes);
      const markup = groups.length
        ? groups.map((group) => {
            const counts = group.items.reduce((acc, node) => {
              acc[assessNode(node)] += 1;
              return acc;
            }, { healthy: 0, warning: 0, degraded: 0 });

            const open = state.forceCollapseAll
              ? false
              : state.groupOpen.has(group.groupName)
                ? state.groupOpen.get(group.groupName)
                : true;

            return `
              <details class="group" data-group="${escapeHtml(group.groupName)}" ${open ? "open" : ""}>
                <summary>
                  <div>
                    <h3 class="group-title">${escapeHtml(group.groupName)}</h3>
                    <div class="mono muted">${group.items.length} 台节点</div>
                  </div>
                  <div class="group-meta">
                    <span class="pill">健康 ${counts.healthy}</span>
                    <span class="pill">警告 ${counts.warning}</span>
                    <span class="pill">退化 ${counts.degraded}</span>
                  </div>
                </summary>
                <div class="group-body">
                  ${group.items.map(renderNode).join("")}
                </div>
              </details>
            `;
          }).join("")
        : '<div class="mono muted">没有节点符合当前筛选条件。</div>';

      el("nodes").innerHTML = markup;
      renderFilters(totalNodes, visibleNodes.length);
      el("toggleGroupsBtn").textContent = state.forceCollapseAll ? "展开全部分组" : "全部折叠";
    }

    async function fetchSnapshot() {
      try {
        const response = await fetch("/api/snapshot", { cache: "no-store" });
        if (!response.ok) {
          el("connState").textContent = "离线";
          return;
        }

        const snapshot = await response.json();
        el("connState").textContent = "正常";
        render(snapshot);
      } catch (err) {
        el("connState").textContent = "离线";
        console.error(err);
      }
    }

    async function fetchAgentInstallConfig() {
      try {
        const response = await fetch("/api/agent-install-config", { cache: "no-store" });
        if (!response.ok) {
          renderAgentInstallCommand({});
          return;
        }

        const config = await response.json();
        renderAgentInstallCommand(config);
      } catch (err) {
        console.error(err);
        renderAgentInstallCommand({});
      }
    }

    function startSnapshotPolling() {
      if (state.snapshotPollTimer) {
        return;
      }

      state.snapshotPollTimer = window.setInterval(() => {
        fetchSnapshot();
      }, 5000);
    }

    el("searchInput").addEventListener("input", (event) => {
      state.search = event.target.value || "";
      render();
    });

    el("healthFilters").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-health]");
      if (!button) {
        return;
      }

      state.healthFilter = button.dataset.health || "all";
      for (const chip of el("healthFilters").querySelectorAll(".chip")) {
        chip.classList.toggle("active", chip === button);
      }
      render();
    });

    el("toggleGroupsBtn").addEventListener("click", () => {
      state.forceCollapseAll = !state.forceCollapseAll;
      state.groupOpen.clear();
      render();
    });

    el("refreshBtn").addEventListener("click", () => {
      fetchSnapshot();
    });

    el("copyAgentInstallBtn").addEventListener("click", async () => {
      const text = state.installCommand || buildAgentInstallCommand(state.installConfig || {});
      try {
        await navigator.clipboard.writeText(text);
        el("agentInstallStatus").textContent = "命令已复制到剪贴板。";
      } catch (err) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "true");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        el("agentInstallStatus").textContent = "命令已复制到剪贴板。";
      }
    });

    document.addEventListener("toggle", (event) => {
      const details = event.target;
      if (!(details instanceof HTMLDetailsElement) || !details.dataset.group) {
        return;
      }

      state.groupOpen.set(details.dataset.group, details.open);
    }, true);

    fetchSnapshot();
    renderAgentInstallCommand({});
    fetchAgentInstallConfig();
    startSnapshotPolling();
  </script>
</body>
</html>
