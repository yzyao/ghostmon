name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: src/GhostMon.Agent/Dockerfile
            repository: ghostmon-agent
          - dockerfile: src/GhostMon.Dashboard/Dockerfile
            repository: ghostmon-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_repository="docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/${{ matrix.repository }}"
          else
            image_repository="${{ matrix.repository }}"
          fi

          {
            echo 'tags<<EOF'
            echo "${image_repository}:${GITHUB_SHA}"

            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${image_repository}:${GITHUB_REF_NAME}"
              echo "${image_repository}:latest"
            fi

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
