name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version tag, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      agent_changed: ${{ steps.filter.outputs.agent_changed }}
      dashboard_changed: ${{ steps.filter.outputs.dashboard_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          agent_changed=false
          dashboard_changed=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            agent_changed=true
            dashboard_changed=true
          else
            base_commit="${{ github.event.before }}"
            if [[ -z "${base_commit}" || "${base_commit}" == "0000000000000000000000000000000000000000" ]]; then
              base_commit="$(git rev-list --max-parents=0 HEAD)"
            fi

            changed_files="$(git diff --name-only "${base_commit}" "${GITHUB_SHA}")"

            if echo "${changed_files}" | grep -Eq '(^|/)src/GhostMon\.Agent/|(^|/)src/GhostMon\.Contracts/|(^|/)src/GhostMon\.Agent/Dockerfile|(^|/)GhostMon\.sln'; then
              agent_changed=true
            fi

            if echo "${changed_files}" | grep -Eq '(^|/)src/GhostMon\.Dashboard/|(^|/)src/GhostMon\.Contracts/|(^|/)src/GhostMon\.Dashboard/Dockerfile|(^|/)GhostMon\.sln'; then
              dashboard_changed=true
            fi
          fi

          echo "agent_changed=${agent_changed}" >> "$GITHUB_OUTPUT"
          echo "dashboard_changed=${dashboard_changed}" >> "$GITHUB_OUTPUT"

  build_agent:
    needs: detect
    if: needs.detect.outputs.agent_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            image_repository="docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/ghostmon-agent"
          else
            image_repository="ghostmon-agent"
          fi

          {
            echo 'tags<<EOF'
            echo "${image_repository}:${GITHUB_SHA}"

            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "${image_repository}:${{ inputs.release_version }}"
              echo "${image_repository}:latest"
            fi

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/GhostMon.Agent/Dockerfile
          platforms: ${{ github.event_name == 'workflow_dispatch' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_dashboard:
    needs: detect
    if: needs.detect.outputs.dashboard_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            image_repository="docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/ghostmon-dashboard"
          else
            image_repository="ghostmon-dashboard"
          fi

          {
            echo 'tags<<EOF'
            echo "${image_repository}:${GITHUB_SHA}"

            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "${image_repository}:${{ inputs.release_version }}"
              echo "${image_repository}:latest"
            fi

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/GhostMon.Dashboard/Dockerfile
          platforms: ${{ github.event_name == 'workflow_dispatch' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
